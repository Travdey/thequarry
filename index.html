<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./thequarrywebsite/folder/favicon.png" type="image/png">
    <title>. . .</title>
    <style>
        body {
            background-color: #161722;
            margin: 0;
            padding: 10px;
        }
        
        .header-text {
            text-align: center;
            color: #ffffff;
            padding: 60px 25px;
            font-size: 24px;
            font-family: "Sitka";
        }
        
        .reveal-block {
            text-align: center;
            color: #ffffff;
            padding: 20px 30px 0;
            font-family: "Sitka";
        }

        .reveal-trigger {
            background: linear-gradient(135deg, #ff7a59, #ff4d6d);
            color: #ffffff;
            border: none;
            border-radius: 999px;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(255, 77, 109, 0.25);
        }

        .reveal-panel {
            display: none;
            margin-top: 16px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .reveal-panel.is-open {
            display: block;
        }

        .reveal-panel p {
            margin: 8px 0;
            line-height: 1.6;
        }

        .reveal-media img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin-top: 12px;
        }
        
        .image-block {
            text-align: center;
            padding: 40px 30px;
        }
        
        .image-block img {
            max-width: 100%;
            height: auto;
        }
        
        .timer-block {
            text-align: center;
            color: #ffffff;
            padding: 40px 20px;
            font-size: 32px;
            font-family: "Sitka";
        }
        
        .timer-display {
            font-size: 48px;
            margin: 20px 0;
            letter-spacing: 2px;
        }
    </style>

</head>
<body>
    <div class="header-text">
        Сколько времени прошло с момента твоего рождения?
    </div>

    <div class="reveal-block">
        <button class="reveal-trigger" id="revealButton" type="button" aria-expanded="false" aria-controls="revealPanel">
            Показать скрытое содержимое
        </button>
        <div class="reveal-panel" id="revealPanel">
            <p>Это блок, который раскрывается по нажатию кнопки.</p>
            <p>Здесь можно разместить текст, изображение и другие медиа.</p>
            <div class="reveal-media">
                <img src="./thequarrywebsite/folder/Untitled.gif" alt="Revealed media">
            </div>
        </div>
    </div>
    
    <div class="image-block">
        <img src="./thequarrywebsite/folder/Untitled.gif" alt="Image">
    </div>
    
    <div class="timer-block">
        <div>Времени осталось...</div>
        <div class="timer-display" id="timer">00:00:00:00</div>
    </div>
    
    <script>
        function updateTimer() {
            // Set the target date to August 15th, 00:00 (midnight)
            const year = new Date().getFullYear();
            let targetDate = new Date(year, 7, 15, 0, 0, 0).getTime();
            
            // If the date has already passed this year, target next year
            if (targetDate < new Date().getTime()) {
                targetDate = new Date(year + 1, 7, 15, 0, 0, 0).getTime();
            }
            
            const now = new Date().getTime();
            const timeLeft = targetDate - now;
            
            if (timeLeft < 0) {
                document.getElementById('timer').textContent = '00:00:00:00';
                return;
            }
            
            const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);
            
            const timerDisplay = 
                String(days).padStart(2, '0') + ':' +
                String(hours).padStart(2, '0') + ':' +
                String(minutes).padStart(2, '0') + ':' +
                String(seconds).padStart(2, '0');
            
            document.getElementById('timer').textContent = timerDisplay;
        }
        
        const revealButton = document.getElementById('revealButton');
        const revealPanel = document.getElementById('revealPanel');

        if (revealButton && revealPanel) {
            revealButton.addEventListener('click', () => {
                const isOpen = revealPanel.classList.toggle('is-open');
                revealButton.textContent = isOpen ? 'Скрыть содержимое' : 'Показать скрытое содержимое';
                revealButton.setAttribute('aria-expanded', String(isOpen));
            });
        }

        // Update timer immediately and then every second
        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
